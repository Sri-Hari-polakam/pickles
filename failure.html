<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Failed | Suravi Pickles</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; background-color: #f9f9f9;">
  
  <nav class="navbar" style="background: white; border-bottom: 1px solid #eee;">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-pepper-hot"></i> Suravi Pickles
      </a>
    </div>
  </nav>

  <div class="container" style="flex: 1; display: flex; justify-content: center; align-items: center; padding: 3rem 1rem;">
    <div class="glass-panel" style="text-align: center; max-width: 500px; padding: 3rem 2rem;">
      <i class="fas fa-times-circle" style="font-size: 5rem; color: #dc3545; margin-bottom: 1.5rem;"></i>
      <h1 style="color: #333; margin-bottom: 1rem;">Payment Failed!</h1>
      <p style="color: #666; font-size: 1.1rem; margin-bottom: 2rem;">Unfortunately, your payment could not be processed. No money was deducted from your account.</p>
      
      <div style="background: #fff8f8; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border: 1px dashed #ffcaca;">
        <p style="margin: 0; color: #555;">Transaction ID:</p>
        <strong id="txnIdDisplay" style="font-size: 1.2rem; color: #dc3545; word-break: break-all;">Loading...</strong>
      </div>

      <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="checkout.html" class="btn btn-outline" style="border-color: #333; color: #333;">Try Again</a>
        <a href="index.html" class="btn btn-primary">Return Home</a>
      </div>
    </div>
  </div>

  <script src="js/firebase-init.js" type="module"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const txnId = urlParams.get('txnId') || 'Not Available';
    document.getElementById('txnIdDisplay').textContent = txnId;
  </script>
</body>
</html>
